apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miniflux
spec:
  releaseName: miniflux
  chartRef:
    kind: OCIRepository
    name: miniflux
  interval: 60m
  install:
    remediation:
      retries: 3
  values:
    TZ: "Europe/Warsaw"

    persistence:
      config:
        enabled: true
        mountPath: /config
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: "local-path-zfs"

    cnpg:
      main:
        cluster:
          instances: 1
          singleNode: true
