apiVersion: cert-manager.io/v1
kind: Certificate
metadata: 
  name: prometheus-ingressroute-certificate
spec:
  secretName: prometheus-certificate-secret
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames: 
    - prometheus.kube-01.home.majabojarska.dev
    - prometheus.home.majabojarska.dev