apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
spec:
  releaseName: searxng
  chartRef:
    kind: OCIRepository
    name: searxng
  interval: 60m
  install:
    remediation:
      retries: 3
  values:
    workload:
      main:
        podSpec:
          containers:
            main:
              fixedEnv:
                TZ: "Europe/Warsaw"

    persistence:
      config:
        enabled: true
        retain: true
        mountPath: /etc/searxng
        storageClass: "local-path-zfs"
        accessMode: ReadWriteOnce
        size: 1Gi

    securityContext:
      pod:
        fsGroup: 10001 # kubernetes GID
        fsGroupChangePolicy: "OnRootMismatch"
