apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
spec:
  releaseName: esphome
  chartRef:
    kind: OCIRepository
    name: esphome
  interval: 60m
  install:
    remediation:
      retries: 3
  values:
    workload:
      main:
        podSpec:
          containers:
            main:
              fixedEnv:
                TZ: "Europe/Warsaw"
              env:
                ESPHOME_DASHBOARD_USE_PING: false
                ESPHOME_DASHBOARD_RELATIVE_URL: /
                # ESPHOME_QUICKWIZARD:
                ESPHOME_IS_HASSIO: true
                # DISABLE_HA_AUTHENTICATION:
                USERNAME:
                  secretKeyRef:
                    name: credentials
                    key: username
                    expandObjectName: false
                PASSWORD:
                  secretKeyRef:
                    name: credentials
                    key: password
                    expandObjectName: false

    resources:
      limits:
        cpu: 4

    securityContext:
      pod:
        fsGroup: 10001 # kubernetes GID
        fsGroupChangePolicy: "OnRootMismatch"
