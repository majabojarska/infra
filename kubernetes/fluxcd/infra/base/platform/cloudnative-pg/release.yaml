apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
spec:
  releaseName: cloudnative-pg
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.27.1
      sourceRef:
        kind: HelmRepository
        name: cnpg
  interval: 60m
  install:
    remediation:
      retries: 3
  values:
    podSecurityContext:
      runAsNonRoot: true
      fsGroup: 10001
