kind: Certificate
metadata: 
  name: alertmanager-ingressroute-certificate
spec:
  secretName: alertmanager-certificate-secret
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames: 
    - alertmanager.kube-01.home.majabojarska.dev
    - alertmanager.home.majabojarska.dev