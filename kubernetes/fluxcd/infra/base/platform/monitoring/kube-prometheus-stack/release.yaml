apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  releaseName: kube-prometheus-stack
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      version: 82.2.1
  values:
    additionalPrometheusRulesMap:
      {}
      #  rule-name:
      #    groups:
      #    - name: my_group
      #      rules:
      #      - record: my_record
      #        expr: 100 * my_record

    grafana:
      persistence:
        enabled: true
        type: sts
        storageClassName: "local-path-zfs"
        accessModes:
          - ReadWriteOnce
        size: 10Gi
        finalizers:
          - kubernetes.io/pvc-protection

    prometheusSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "local-path-zfs"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

    alertmanager:
      enabled: false
      monitor:
        enabled: false

    alertmanagerSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "local-path-zfs"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  interval: 60m
  install:
    remediation:
      retries: 3
