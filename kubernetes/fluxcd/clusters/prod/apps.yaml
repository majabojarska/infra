---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 60m
  dependsOn:
    - name: platform
  timeout: 20m
  force: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/fluxcd/apps/prod
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
