---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 60m
  retryInterval: 5m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/fluxcd/infra/prod/platform
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage
  namespace: flux-system
spec:
  interval: 60m
  retryInterval: 5m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/fluxcd/infra/prod/storage
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
